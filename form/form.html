<!DOCTYPE html>
<html>
<head>
  <title>Twinkle Trinkets Feedback & Enquiry</title>
  <style>
    form {
      width: 80%;
      margin: 10px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 10px rgba(0,0,0,0.1);
      background-color: #EAF3FF;
	  color:purple;
      font-family: Arial, sans-serif;
    }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 95%;
      padding: 10px;
      margin-bottom: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    textarea { resize: vertical; min-height: 100px; }

    /* Star rating */
    .stars {
      display: inline-flex;
      flex-direction: row-reverse;
      margin-bottom: 15px;
    }
    .stars input { display: none; }
    .stars label {
      font-size: 30px;
      color: gray;
      cursor: pointer;
    }
    .stars input:checked ~ label { color: purple; }

    button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background-color: #45a049; }
  </style>
</head>
<body>

<h1 align="center" style="color:purple;">Twinkle Trinkets Feedback & Enquiry</h1>

<!-- ✅ Action now points to the thank-you page -->
<form action="thankyou.html" method="get">
  <label for="name">Full Name:</label>
  <input type="text" id="name" name="name" required>

  <label for="email">Email Address:</label>
  <input type="email" id="email" name="email" required>

  <label for="subject">Subject:</label>
  <input type="text" id="subject" name="subject" required>

  <label for="message">Your Feedback / Enquiry:</label>
  <textarea id="message" name="message" required></textarea>

  <label>Rate Your Shopping Experience:</label>
  <div class="stars">
    <input type="radio" id="s5" name="rating" value="5"><label for="s5">★</label>
    <input type="radio" id="s4" name="rating" value="4"><label for="s4">★</label>
    <input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label>
    <input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label>
    <input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label>
  </div>

  <label>
    <input type="checkbox" name="agree" required>
    I understand my feedback helps Twinkle Trinkets improve.
  </label>

  <button type="submit">Submit</button>
  <button type="reset">Reset</button>
</form>

</body>
</html>
