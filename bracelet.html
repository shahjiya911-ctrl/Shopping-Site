<title>Twinkle Trinkets Bracelets</title>

<style>
/* ===== CUSTOM COLOR: change this single line ===== */
:root {
  --accent-color: #2D5BE3;   /* <--- CHANGE THIS COLOR AS YOU NEED */
}
/* ================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #EAF3FF;
  font-family: sans-serif;
  padding: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
  max-width: 1000px;
  margin: 0 auto;
}

.card {
  background: #FFFACD;
  border-radius: 8px;
  border: 2px solid var(--accent-color);
  box-shadow: 0 6px 12px rgba(0,0,0,0.1);
  text-align: center;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 320px;
  padding: 20px 20px 20px 20px; /* Polaroid bottom space */
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 75%;
  object-fit: cover;
  border-bottom: 4px solid var(--accent-color);
}

.card p {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: var(--accent-color);
  font-weight: bold;
}

a {
  text-decoration: none;
  color: inherit;
  display: block;
  height: 100%;
}
/* ===== MOBILE FIX ===== */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr); /* 2 per row */
    gap: 15px;
  }

  .card {
    height: auto;
  }

  .card img {
    height: auto;
  }
}

@media (max-width: 480px) {
  .grid {
    grid-template-columns: 1fr; /* 1 per row */
  }
}
</style>
</head>
